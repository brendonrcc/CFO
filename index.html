<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CFO - Professores</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/7Q1KoaM.png">
    <script src="https://cdn.tailwindcss.com"></script>

    <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script crossorigin="anonymous" src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@300;400;500;600;700&family=Anton&family=JetBrains+Mono:wght@400;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                        condensed: ['Oswald', 'sans-serif'],
                        display: ['Anton', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        poppins: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#2e5c18',
                            hover: '#224212',
                            light: '#4a7a30',
                            accent: '#fbbf24',
                        },
                        paper: '#fdfbf7',
                        dark: {
                            bg: '#0a0f0b',
                            surface: '#121a14',
                            element: '#1c261e',
                            hover: '#253026',
                        }
                    },
                    backgroundImage: {
                        'military-grid': "linear-gradient(rgba(46, 92, 24, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(46, 92, 24, 0.1) 1px, transparent 1px)",
                    },
                    boxShadow: {
                        'tactical': '0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.15)',
                        'folder': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.1)',
                    },
                    animation: {
                        'slide-in': 'slideIn 0.3s ease-out forwards',
                        'slide-out': 'slideOut 0.3s ease-in forwards',
                        'scan': 'scan 3s linear infinite',
                        'blink': 'blink 1s step-end infinite',
                    },
                    keyframes: {
                        slideIn: {
                            '0%': { transform: 'translateX(100%)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' },
                        },
                        slideOut: {
                            '0%': { transform: 'translateX(0)', opacity: '1' },
                            '100%': { transform: 'translateX(100%)', opacity: '0' },
                        },
                        scan: {
                            '0%': { top: '0%' },
                            '100%': { top: '100%' }
                        },
                        blink: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' }
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://raw.githack.com/brendonrcc/CFO/main/style.css">
</head>

<body>
    <div id="root"></div>

<script type="text/babel" src="https://raw.githack.com/brendonrcc/CFO/main/script.js"></script>
</body>

</html>
